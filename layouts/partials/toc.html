{{- $toc := .TableOfContents -}}
{{- $hasTOC := strings.Contains $toc "<li>" -}}
{{- if $hasTOC -}}
{{- $tocTitle := i18n "toc" | default "Table of Contents" -}}
<aside class="entry-sidebar entry-sidebar--outside" aria-label="{{- $tocTitle -}}">
    <details class="entry-toc entry-toc--sidebar"{{ if (.Param "TocOpen") }} open{{ end }}>
        <summary class="entry-toc__toggle" accesskey="c" title="(Alt + C)">
            {{- $tocTitle -}}
        </summary>
        <div class="entry-toc__inner">
            <h2 class="entry-toc__title"><a href="#post-top">{{ .Title }}</a></h2>
            <div class="entry-toc__body">
                {{- $toc -}}
            </div>
        </div>
    </details>
</aside>
<script>
(function () {
    "use strict";

    function initPostToc() {
        if (window.matchMedia("(max-width: 767px)").matches) {
            return;
        }

        var tocRoot = document.querySelector(".entry-sidebar--outside");
        if (!tocRoot) {
            return;
        }

        var tocBody = tocRoot.querySelector(".entry-toc__body");
        if (!tocBody) {
            return;
        }

        var tocLinks = Array.prototype.slice.call(
            tocBody.querySelectorAll('a[href^="#"]')
        );
        if (!tocLinks.length) {
            return;
        }

        var headingPairs = tocLinks
            .map(function (link) {
                var href = link.getAttribute("href") || "";
                var rawId = href.slice(1);
                if (!rawId) {
                    return null;
                }

                var decodedId = rawId;
                try {
                    decodedId = decodeURIComponent(rawId);
                } catch (error) {
                    decodedId = rawId;
                }

                var heading =
                    document.getElementById(decodedId) || document.getElementById(rawId);
                if (!heading) {
                    return null;
                }

                return {
                    heading: heading,
                    link: link
                };
            })
            .filter(function (item) {
                return item !== null;
            });

        if (!headingPairs.length) {
            return;
        }

        var tocInner = tocRoot.querySelector(".entry-toc__inner");
        var activeLink = null;
        var fallbackTicking = false;

        function setActive(link) {
            if (!link || activeLink === link) {
                return;
            }

            if (activeLink) {
                activeLink.classList.remove("is-active");
            }

            activeLink = link;
            activeLink.classList.add("is-active");

            if (!tocInner || tocInner.scrollHeight <= tocInner.clientHeight) {
                return;
            }

            var targetTop =
                activeLink.offsetTop -
                tocInner.clientHeight / 2 +
                activeLink.clientHeight / 2;

            tocInner.scrollTo({
                top: Math.max(0, targetTop),
                behavior: "auto"
            });
        }

        function findClosestHeading() {
            var candidates = headingPairs
                .map(function (item) {
                    return {
                        heading: item.heading,
                        link: item.link,
                        top: item.heading.getBoundingClientRect().top
                    };
                })
                .filter(function (item) {
                    return item.top <= window.innerHeight * 0.4;
                });

            if (candidates.length) {
                return candidates[candidates.length - 1];
            }

            return headingPairs[0];
        }

        tocLinks.forEach(function (link) {
            link.addEventListener("click", function () {
                setActive(link);
            });
        });

        setActive(headingPairs[0].link);

        if ("IntersectionObserver" in window) {
            var visibleHeadings = new Set();
            var observer = new IntersectionObserver(
                function (entries) {
                    entries.forEach(function (entry) {
                        if (entry.isIntersecting) {
                            visibleHeadings.add(entry.target);
                        } else {
                            visibleHeadings.delete(entry.target);
                        }
                    });

                    var targetPair = null;
                    if (visibleHeadings.size) {
                        var sorted = Array.from(visibleHeadings).sort(function (a, b) {
                            return a.getBoundingClientRect().top - b.getBoundingClientRect().top;
                        });
                        var visibleTop = sorted[0];
                        targetPair = headingPairs.find(function (item) {
                            return item.heading === visibleTop;
                        });
                    }

                    if (!targetPair) {
                        targetPair = findClosestHeading();
                    }

                    if (targetPair) {
                        setActive(targetPair.link);
                    }
                },
                {
                    rootMargin: "-25% 0px -60% 0px",
                    threshold: [0, 1]
                }
            );

            headingPairs.forEach(function (item) {
                observer.observe(item.heading);
            });
        } else {
            function onScrollFallback() {
                if (fallbackTicking) {
                    return;
                }

                fallbackTicking = true;

                window.requestAnimationFrame(function () {
                    var targetPair = findClosestHeading();
                    if (targetPair) {
                        setActive(targetPair.link);
                    }
                    fallbackTicking = false;
                });
            }

            window.addEventListener("scroll", onScrollFallback, { passive: true });
            onScrollFallback();
        }
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initPostToc, { once: true });
    } else {
        initPostToc();
    }
})();
</script>
{{- end -}}
